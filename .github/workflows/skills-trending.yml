name: Skills Trending Daily

on:
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 02:00 UTC (10:00 Beijing)

  workflow_dispatch:

concurrency:
  group: skills-trending
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trending:
    name: Generate Skills Trending Report
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Show environment info
        run: |
          echo "Python: $(python --version)"
          echo "Working directory: $(pwd)"
          echo "Current time (UTC): $(date -u)"
          echo "Target date: $(date -u +%Y-%m-%d)"

      - name: Create data directory
        run: mkdir -p data

      - name: Debug environment variables
        run: |
          echo "=== Checking Secrets ==="
          echo "EMAIL_METHOD: $EMAIL_METHOD"
          echo "LLM_API_KEY is set: $(if [ -n "$LLM_API_KEY" ]; then echo 'YES (length: ${#LLM_API_KEY})'; else echo 'NO'; fi)"
          echo "LLM_BASE_URL: $LLM_BASE_URL"
          echo "LLM_MODEL: $LLM_MODEL"
          echo "EMAIL_TO: $EMAIL_TO"
          echo "SMTP_HOST: $SMTP_HOST"

      - name: Run Skills Trending
        env:
          EMAIL_METHOD: ${{ secrets.EMAIL_METHOD || 'resend' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL || 'onboarding@resend.dev' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DB_RETENTION_DAYS: 30
        run: python src/main_trending.py

      - name: Upload database backup
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trends-db-${{ github.run_number }}
          path: data/trends.db
          retention-days: 90

      - name: Check execution result
        if: always()
        run: |
          if [ -f "data/trends.db" ]; then
            echo "Database file exists"
            ls -lh data/
          else
            echo "Database file not found"
          fi
